<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Whistler Blackcomb Pro Tracker</title>

    <!-- MapLibre GL JS (Allows 3D Map Rotation) -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    
    <!-- Turf.js for Advanced Spatial Math (Snapping to runs, Distance) -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #007aff;
            --bg-glass: rgba(20, 20, 22, 0.85);
            --text-light: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body, html { height: 100%; width: 100%; overflow: hidden; background: #111; color: var(--text-light); }

        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }

        /* HUD (Heads Up Display) */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            z-index: 10;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #fff; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        /* Floating Action Buttons */
        .fab-container {
            position: absolute;
            bottom: 110px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .fab {
            width: 50px;
            height: 50px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .fab.active { background: #34c759; color: white; border-color: #34c759; }

        /* Bottom Lift Panel */
        #lift-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px 24px 0 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateY(calc(100% - 90px));
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #lift-panel.open { transform: translateY(0); }

        .panel-header { height: 90px; padding: 15px 20px; cursor: pointer; position: relative; }
        .drag-indicator { width: 40px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; margin: 0 auto 10px; }
        .panel-title { font-size: 1.2rem; font-weight: 800; }
        .panel-subtitle { font-size: 0.85rem; color: #aaa; margin-top: 5px; }

        .lift-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; list-style: none; }
        .lift-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lift-name { font-weight: 600; font-size: 0.95rem; }
        
        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-open { background: rgba(52, 199, 89, 0.2); color: #34c759; border: 1px solid #34c759; }
        .status-closed { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid #ff3b30; }
        .status-hold { background: rgba(255, 204, 0, 0.2); color: #ffcc00; border: 1px solid #ffcc00; }

        /* Battery Saver Overlay (Black screen to save battery while keeping phone awake) */
        #battery-saver {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; color: white; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #battery-saver p { margin: 10px 0; color: #555; }
        #battery-saver h1 { color: #34c759; }
        #unlock-btn { padding: 15px 30px; background: #333; color: white; border: none; border-radius: 20px; font-size: 1.2rem; margin-top: 30px; }
    </style>
</head>
<body>

    <!-- HUD -->
    <div id="hud">
        <div class="stat">
            <div class="stat-value" id="speed-val">0</div>
            <div class="stat-label">km/h</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="dist-val">0.00</div>
            <div class="stat-label">km Distance</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="snap-val" style="font-size:1rem; margin-top:5px; color:#ffcc00">Loading</div>
            <div class="stat-label">Run Data</div>
        </div>
    </div>

    <!-- Battery Saver UI (For Screen-Off tracking alternative) -->
    <div id="battery-saver">
        <h1>Tracking Active</h1>
        <p>Your screen is blacked out to save OLED battery.</p>
        <p>The browser is kept awake so GPS distance continues recording.</p>
        <h2 id="bs-dist" style="margin-top:20px;">0.00 km</h2>
        <button id="unlock-btn">Stop & View Map</button>
    </div>

    <div id="map"></div>

    <div class="fab-container">
        <!-- Record Button -> Triggers WakeLock -->
        <div class="fab" id="record-btn" title="Start Tracking & Battery Saver">🔴</div>
        <!-- Locate Button -->
        <div class="fab" id="locate-btn" title="Center on Me">🎯</div>
    </div>

    <!-- Lift Panel -->
    <div id="lift-panel">
        <div class="panel-header" id="toggle-panel">
            <div class="drag-indicator"></div>
            <div class="panel-title">Whistler Lifts</div>
            <div class="panel-subtitle" id="lift-status-text">Fetching API...</div>
        </div>
        <ul class="lift-list" id="lift-list"></ul>
    </div>

    <script>
        // ==========================================
        // 1. MAPLIBRE GL INITIALIZATION (3D / Rotation)
        // ==========================================
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'osm': { type: 'raster', tiles: ['https://a.tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256 },
                    'slopes': { type: 'raster', tiles:['https://tile.waymarkedtrails.org/slopes/{z}/{x}/{y}.png'], tileSize: 256 }
                },
                layers:[
                    { id: 'osm-layer', type: 'raster', source: 'osm' },
                    { id: 'slopes-layer', type: 'raster', source: 'slopes' }
                ]
            },
            center:[-122.95, 50.065],
            zoom: 12,
            pitch: 45, // Start slightly tilted for 3D effect
            bearing: 0 // Allow rotation
        });

        // Add 3D rotation compass controls to the top right
        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // Main waypoints
        new maplibregl.Marker({color: "#ff3b30"}).setLngLat([-122.948, 50.060]).setPopup(new maplibregl.Popup().setText("Roundhouse Lodge")).addTo(map);
        new maplibregl.Marker({color: "#ff3b30"}).setLngLat([-122.957, 50.116]).setPopup(new maplibregl.Popup().setText("Whistler Village")).addTo(map);

        // User location marker source & layer
        map.on('load', () => {
            map.addSource('user-loc', {
                type: 'geojson',
                data: { type: 'Feature', geometry: { type: 'Point', coordinates:[-122.95, 50.065] } }
            });
            map.addLayer({
                id: 'user-loc-layer',
                type: 'circle',
                source: 'user-loc',
                paint: {
                    'circle-radius': 10,
                    'circle-color': '#007aff',
                    'circle-stroke-width': 3,
                    'circle-stroke-color': '#ffffff'
                }
            });
        });

        // ==========================================
        // 2. FETCH SKI RUNS FOR SNAPPING (Turf.js)
        // ==========================================
        let skiRunsGeoJSON = null;
        
        async function fetchSkiRuns() {
            try {
                // Uses Overpass API to get all downhill paths in the Whistler Bounding Box
                const query = `[out:json];way["piste:type"="downhill"](50.04,-122.99,50.13,-122.88);out geom;`;
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                // Convert to Turf LineStrings
                const features = data.elements.map(el => {
                    if(!el.geometry) return null;
                    const coords = el.geometry.map(g =>[g.lon, g.lat]);
                    if(coords.length < 2) return null;
                    return turf.lineString(coords);
                }).filter(f => f !== null);

                skiRunsGeoJSON = turf.featureCollection(features);
                document.getElementById('snap-val').innerText = "Active";
                document.getElementById('snap-val').style.color = "#34c759";
            } catch (err) {
                console.warn("Failed to load ski runs for snapping.");
                document.getElementById('snap-val').innerText = "Failed";
                document.getElementById('snap-val').style.color = "#ff3b30";
            }
        }
        fetchSkiRuns();

        // ==========================================
        // 3. TRACKING, SPEED, DISTANCE & SNAPPING
        // ==========================================
        let watchId = null;
        let lastCoord = null;
        let totalDistanceKm = 0;

        function startTracking() {
            if (!navigator.geolocation) return alert("GPS not supported.");

            document.getElementById('locate-btn').classList.add('active');

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    let lng = pos.coords.longitude;
                    let lat = pos.coords.latitude;
                    let currentPoint = turf.point([lng, lat]);

                    // SNAP TO CLOSEST RUN LOGIC
                    if (skiRunsGeoJSON) {
                        let closestRun = null;
                        let minDistance = Infinity;
                        
                        // Find the closest run line
                        turf.featureEach(skiRunsGeoJSON, (line) => {
                            const snapped = turf.nearestPointOnLine(line, currentPoint);
                            if (snapped.properties.dist < minDistance) {
                                minDistance = snapped.properties.dist;
                                closestRun = snapped;
                            }
                        });

                        // If you are within 40 meters of a ski run, pull your GPS dot perfectly onto the line!
                        if (minDistance < 0.040 && closestRun) {
                            currentPoint = closestRun;
                        }
                    }

                    // Update Map Dot
                    if (map.getSource('user-loc')) {
                        map.getSource('user-loc').setData(currentPoint);
                        map.panTo(currentPoint.geometry.coordinates);
                    }

                    // CALCULATE TOTAL DISTANCE
                    if (lastCoord) {
                        let stepDist = turf.distance(lastCoord, currentPoint, {units: 'kilometers'});
                        // Ignore tiny GPS jitters
                        if (stepDist > 0.005) { 
                            totalDistanceKm += stepDist;
                        }
                    }
                    lastCoord = currentPoint;
                    
                    // UPDATE SPEED (Browser API handles this cleanly now)
                    let speedKmh = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(1) : 0;

                    document.getElementById('speed-val').innerText = speedKmh;
                    document.getElementById('dist-val').innerText = totalDistanceKm.toFixed(2);
                    document.getElementById('bs-dist').innerText = totalDistanceKm.toFixed(2) + " km";

                },
                (err) => {
                    alert(`GPS Error: ${err.message}. Ensure Location Services are turned on for your browser.`);
                    document.getElementById('locate-btn').classList.remove('active');
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }

        document.getElementById('locate-btn').addEventListener('click', () => {
            if(!watchId) startTracking();
        });

        // ==========================================
        // 4. SCREEN OFF / WAKE LOCK API (Battery Saver)
        // ==========================================
        // Because web browsers stop tracking when the screen locks, we request the OS to keep the screen on,
        // but we make the screen pitch black to preserve OLED battery.
        let wakeLock = null;
        const recordBtn = document.getElementById('record-btn');
        const batterySaverUI = document.getElementById('battery-saver');
        const unlockBtn = document.getElementById('unlock-btn');

        async function toggleRecordMode() {
            if (!wakeLock) {
                try {
                    // Start GPS Tracking automatically
                    if(!watchId) startTracking();

                    // Request Screen Wake Lock
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                    }
                    
                    recordBtn.classList.add('active');
                    batterySaverUI.style.display = 'flex'; // Go to black screen

                } catch (err) {
                    alert("Wake Lock blocked by browser. Leave screen on to track distance.");
                }
            }
        }

        async function stopRecordMode() {
            batterySaverUI.style.display = 'none';
            if (wakeLock) {
                await wakeLock.release();
                wakeLock = null;
                recordBtn.classList.remove('active');
            }
        }

        recordBtn.addEventListener('click', toggleRecordMode);
        unlockBtn.addEventListener('click', stopRecordMode);

        // ==========================================
        // 5. EXTENDED LIFTIE API FETCH
        // ==========================================
        async function fetchLifts() {
            const statusText = document.getElementById('lift-status-text');
            const listEl = document.getElementById('lift-list');
            
            const apiUrl = `https://liftie.info/api/resort/whistler-blackcomb`;
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;

            try {
                const res = await fetch(proxy);
                const data = await res.json();
                
                if (data && data.lifts && data.lifts.status) {
                    // Extract Stats (e.g., 20/35 Open)
                    let totalLifts = Object.keys(data.lifts.status).length;
                    let openLifts = Object.values(data.lifts.status).filter(s => s === 'open').length;
                    
                    statusText.innerHTML = `<span style="color:#34c759">${openLifts}</span> / ${totalLifts} Lifts Open`;
                    
                    renderLifts(data.lifts.status);
                }
            } catch (e) {
                statusText.innerText = "API Offline";
            }
        }

        function renderLifts(lifts) {
            const listEl = document.getElementById('lift-list');
            listEl.innerHTML = ''; 

            const liftArray = Object.keys(lifts).map(name => ({ name, status: lifts[name] }));
            liftArray.sort((a,b) => a.name.localeCompare(b.name));

            liftArray.forEach(lift => {
                const li = document.createElement('li');
                li.className = 'lift-item';
                
                let statusClass = 'status-closed';
                let statusText = String(lift.status).toLowerCase();
                
                if (statusText.includes('open')) statusClass = 'status-open';
                else if (statusText.includes('hold')) statusClass = 'status-hold';
                
                li.innerHTML = `
                    <span class="lift-name">${lift.name}</span>
                    <span class="status-badge ${statusClass}">${lift.status}</span>
                `;
                listEl.appendChild(li);
            });
        }

        // Bottom Panel Logic
        const panel = document.getElementById('lift-panel');
        document.getElementById('toggle-panel').addEventListener('click', () => panel.classList.toggle('open'));

        fetchLifts();
        setInterval(fetchLifts, 60000); 

    </script>
</body>
</html>
